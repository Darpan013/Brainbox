name: BrainBox Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Only one release build runs at a time; cancel any stale in-progress run
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write   # needed to create / upload a GitHub Release

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux ─────────────────────────────────────────────────────────
          - platform: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            sidecar-name: ollama-x86_64-unknown-linux-gnu
            artifacts: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/rpm/*.rpm

          # ── Windows ───────────────────────────────────────────────────────
          - platform: windows-latest
            rust-target: x86_64-pc-windows-msvc
            sidecar-name: ollama-x86_64-pc-windows-msvc.exe
            artifacts: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

          # ── macOS Intel ───────────────────────────────────────────────────
          - platform: macos-13
            rust-target: x86_64-apple-darwin
            sidecar-name: ollama-x86_64-apple-darwin
            artifacts: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz

          # ── macOS Apple Silicon ───────────────────────────────────────────
          - platform: macos-14
            rust-target: aarch64-apple-darwin
            sidecar-name: ollama-aarch64-apple-darwin
            artifacts: |
              src-tauri/target/release/bundle/dmg/*.dmg
              src-tauri/target/release/bundle/macos/*.app.tar.gz

    runs-on: ${{ matrix.platform }}

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── 2. Verify required sidecar binary is present ───────────────────────
      # This is a hard gate: if the correct platform binary is missing from
      # src-tauri/binaries/ the build will fail here with a clear message
      # rather than producing a broken installer silently.
      - name: Verify sidecar binary exists
        shell: bash
        run: |
          BINARY="src-tauri/binaries/${{ matrix.sidecar-name }}"
          if [ ! -f "$BINARY" ]; then
            echo "❌ Required sidecar binary not found: $BINARY"
            echo "   Commit the binary before tagging a release."
            exit 1
          fi
          SIZE=$(du -sh "$BINARY" | cut -f1)
          echo "✅ Sidecar found: $BINARY ($SIZE)"

      # ── 2b. Make sidecar executable (non-Windows only) ────────────────────────
      - name: Make sidecar binary executable
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: chmod +x src-tauri/binaries/${{ matrix.sidecar-name }}

      # ── 3. Rust toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 4. Linux system dependencies ───────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev \
            patchelf \
            file

      # ── 5. Node + pnpm ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store path
        shell: bash
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        run: pnpm install

      # ── 5.5. Setup WiX 3.11 (Windows Only) ─────────────────────────────────
      # Override the default AppData WiX cache with a short, space-free path
      # so that light.exe and candle.exe can be invoked without quoting issues.
      - name: Setup WiX Toolset
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\wix
          Invoke-WebRequest -Uri https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip -OutFile C:\wix\wix.zip
          Expand-Archive -Path C:\wix\wix.zip -DestinationPath C:\wix
          "TAURI_WIX_DIR=C:\wix" >> $env:GITHUB_ENV


      # ── 6. Build & bundle ──────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Windows code signing (optional — set these secrets to enable) ─
          TAURI_SIGNING_PRIVATE_KEY:    ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}      # e.g. v1.0.0
          releaseName: 'BrainBox ${{ github.ref_name }}'
          releaseBody: |
            ## BrainBox ${{ github.ref_name }} 

            ### Downloads
            | Platform | Installer |
            |---|---|
            | Windows | `.exe` (NSIS) |
            | macOS Intel | `.dmg` |
            | macOS Apple Silicon | `.dmg` |
            | Linux | `.deb` / `.AppImage` |

            > Ollama is bundled — no separate installation required.
          releaseDraft: true     # publish manually after QA
          prerelease: false
          tauriScript: pnpm tauri
