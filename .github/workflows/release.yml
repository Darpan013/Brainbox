name: BrainBox Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Only one release build runs at a time; cancel any stale in-progress run
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write   # needed to create / upload a GitHub Release

    runs-on: windows-latest

    steps:

      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      # ── 2. Verify required sidecar binary is present ───────────────────────
      # Hard gate — fails fast with a clear message rather than a silent bad installer.
      - name: Verify sidecar binary exists
        shell: bash
        run: |
          BINARY="src-tauri/binaries/ollama-x86_64-pc-windows-msvc.exe"
          if [ ! -f "$BINARY" ]; then
            echo "❌ Required sidecar binary not found: $BINARY"
            echo "   Commit the binary before tagging a release."
            exit 1
          fi
          SIZE=$(du -sh "$BINARY" | cut -f1)
          echo "✅ Sidecar found: $BINARY ($SIZE)"

      # ── 3. Rust toolchain ──────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── 4. Node + pnpm ─────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store path
        shell: bash
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        run: pnpm install

      # ── 5. Setup WiX 3.11 ─────────────────────────────────────────────────
      # Override the default AppData WiX cache (which has a space-ridden path
      # that causes light.exe to fail) with a clean, short D: drive path.
      - name: Setup WiX Toolset
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path D:\tauri-wix
          Invoke-WebRequest `
            -Uri https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip `
            -OutFile D:\tauri-wix\wix.zip
          Expand-Archive -Path D:\tauri-wix\wix.zip -DestinationPath D:\tauri-wix
          "TAURI_WIX_DIR=D:\tauri-wix" >> $env:GITHUB_ENV

      # ── 6. Build & bundle ──────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ── Windows code signing (optional — set these secrets to enable) ─
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}        # e.g. v1.0.0
          releaseName: 'BrainBox ${{ github.ref_name }}'
          releaseBody: |
            ## BrainBox ${{ github.ref_name }}

            ### Downloads
            | Platform | Installer |
            |---|---|
            | Windows | `.exe` (NSIS) / `.msi` |

            > Ollama is bundled — no separate installation required.
          releaseDraft: true      # publish manually after QA
          prerelease: false
          tauriScript: pnpm tauri
